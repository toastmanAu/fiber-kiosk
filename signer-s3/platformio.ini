; ============================================================
; ESP32-S3 Fiber Channel Signer — PlatformIO Configuration
; Cost-reduced variant of the ESP32-P4 Fiber Signer
; ============================================================
[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Serial / USB ────────────────────────────────────────────
; UART0 is used for JSON-RPC (921600 baud)
; USB CDC (native USB on S3) used for debug output
monitor_speed = 921600
upload_speed  = 921600

; ── Board flags ─────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ArduinoJson capacity
    -DARDUINOJSON_ENABLE_ARDUINO_STRING=1
    ; Trezor-crypto options
    -DUSE_RFC6979=1
    -DUSE_PRECOMPUTED_CP=1
    -DUSE_INVERSE_FAST=1
    -DUSE_BIP32_CACHE=0
    -DUSE_BIP39_CACHE=0
    -DUSE_ETHEREUM=0
    -DUSE_GRAPHENE=0
    -DUSE_NEM=0
    -DUSE_MONERO=0
    -DUSE_CARDANO=0
    -DUSE_KECCAK=0
    -O2

; ── Flash & partition ───────────────────────────────────────
; huge_app gives ~3MB app + small OTA + NVS + LittleFS
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs

; ── Libraries ───────────────────────────────────────────────
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    ; CKB-ESP32: secp256k1, Blake2b, CKB address, RPC client
    https://github.com/toastmanAu/CKB-ESP32.git
    ; Wyltek Embedded Builder: display, touch, settings, UI, sensors
    https://github.com/toastmanAu/wyltek-embedded-builder.git
    ; LittleFS is built into Arduino ESP32 framework

; ── Build settings ──────────────────────────────────────────
build_type   = release
build_unflags = -Os

; ── Source directories ──────────────────────────────────────
; trezor_crypto and blake2b now provided by CKB-ESP32 lib
; Local sources only:
build_src_filter =
    +<*>

; ── Upload ──────────────────────────────────────────────────
; Uncomment and set correct port if auto-detect fails:
; upload_port = /dev/ttyACM0
